name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build frontend
        run: cd web && npm ci && npm run build
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar czf skimdiff-$VERSION-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release skimdiff
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: skimdiff-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" skimdiff-*.tar.gz \
            --repo "$GITHUB_REPOSITORY" \
            --title "skimdiff ${GITHUB_REF_NAME#v}" \
            --generate-notes

  tap:
    needs: release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF_NAME#v}
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          sha() { sha256sum "skimdiff-$VERSION-$1.tar.gz" | cut -d' ' -f1; }

          git clone "https://x-access-token:${GH_TOKEN}@github.com/techsavd/homebrew-tap.git" tap
          cat > tap/Formula/skimdiff.rb <<EOF
          class Skimdiff < Formula
            desc "Lightweight browser-based review of agent-made code changes"
            homepage "https://github.com/techsavd/skimdiff"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE}/skimdiff-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "$(sha aarch64-apple-darwin)"
              end
              on_intel do
                url "${BASE}/skimdiff-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "$(sha x86_64-apple-darwin)"
              end
            end

            on_linux do
              on_arm do
                url "${BASE}/skimdiff-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "$(sha aarch64-unknown-linux-gnu)"
              end
              on_intel do
                url "${BASE}/skimdiff-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "$(sha x86_64-unknown-linux-gnu)"
              end
            end

            def install
              bin.install "skimdiff"
            end

            test do
              assert_match "skimdiff", shell_output("#{bin}/skimdiff --version")
            end
          end
          EOF
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/skimdiff.rb
          git commit -m "skimdiff ${VERSION}"
          git push
